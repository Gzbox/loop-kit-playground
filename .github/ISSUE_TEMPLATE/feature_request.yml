name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - P0-critical — essential for the project to work
        - P1-high — important for core experience
        - P2-medium — quality of life improvement
        - P3-low — nice to have
    validations:
      required: true

  - type: dropdown
    id: classification
    attributes:
      label: Implementation Approach
      description: Does this need planning first?
      options:
        - Direct — clear scope, can implement directly
        - Plan needed — requires design/architecture discussion first
        - Human decision — needs user input before proceeding
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What do you want and why?
      placeholder: |
        **What:**

        **Why:**

        **Suggested approach (optional):**
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Done When
      description: How do we know this is complete?
      placeholder: "The user can..."
    validations:
      required: false
