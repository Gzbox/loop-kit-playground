name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How critical is this bug?
      options:
        - P0-critical — blocks all progress
        - P1-high — core functionality broken
        - P2-medium — quality issue
        - P3-low — minor / cosmetic
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
      placeholder: |
        **What happened:**

        **Expected behavior:**

        **Steps to reproduce:**
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, version, relevant config
      placeholder: "macOS 15.3, Swift 6.0, etc."
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Done When
      description: How do we know this is fixed?
      placeholder: "The app no longer crashes when..."
    validations:
      required: false
